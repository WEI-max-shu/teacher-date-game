<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第一次約會問答小遊戲</title>

<style>
body{
font-family:Arial,sans-serif;
text-align:center;
padding:30px;
background:#fff5f7;
}

h1{
color:#e11d48;
}

button{
font-size:22px;
padding:12px 20px;
margin:10px;
border:none;
border-radius:12px;
cursor:pointer;
}

.draw{
background:#e11d48;
color:white;
}

.reset{
background:#ffdce5;
}

#number{
font-size:60px;
font-weight:bold;
margin:20px;
color:#e11d48;
}

#question{
font-size:26px;
margin:20px;
}
</style>
</head>

<body>

<h1>💕 第一次約會問答小遊戲</h1>

<button class="draw" onclick="drawQuestion()">🎲 抽一題</button>
<button class="reset" onclick="resetGame()">重新開始</button>

<div id="number">?</div>
<div id="question">準備好了就開始吧！</div>

<script>
const questions = [
"如果明天突然放假一天，你最想做什麼？",
"你最近有什麼事情讓自己心情很好嗎？",
"朋友通常都怎麼形容你？",
"你覺得自己最奇怪的小習慣是什麼？",
"如果現在可以立刻出國，你第一個想去哪？"
];

let remaining=[...questions];

function drawQuestion(){
if(remaining.length===0){
document.getElementById("question").innerText="題目抽完了！";
return;
}

const index=Math.floor(Math.random()*remaining.length);
const q=remaining[index];

document.getElementById("number").innerText=
questions.indexOf(q)+1;

document.getElementById("question").innerText=q;

remaining.splice(index,1);
}

function resetGame(){
remaining=[...questions];
document.getElementById("number").innerText="?";
document.getElementById("question").innerText="準備好了就開始吧！";
}
</script>

</body>
</html>
